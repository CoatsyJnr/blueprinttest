blueprint:
  name: ADHD-Friendly Brushing System (Morning & Evening)
  description: >
    An unpredictable, ADHD-friendly toothbrushing tracker and reminder system. 
    Delays notifications by a random window to defeat notification blindness.
    
    **Prerequisite:** Create a 'Toggle' helper (Settings > Devices & Services > Helpers) named something obvious like "Toothbrush Tracker". This acts as the brain to remember if you have successfully brushed today.
  domain: automation
  source_url: https://github.com/CoatsyJnr/home-assistant-blueprints/blob/main/adhd_toothbrush_system.yaml
  author: CoatsyJnr
  homeassistant:
    min_version: 2024.6.0
  
  input:
    # --- PRIMARY SETUP ---
    toothbrush_entity:
      name: Which toothbrush are we tracking?
      description: >
        Select the sensor that tracks what your brush is doing right now. 
        For Oral-B, select the sensor explicitly named "State". For Philips Sonicare, choose the "Handle State" sensor, the "Activity" sensor, or the "Brushing" binary sensor.
      selector:
        entity:
          multiple: false
          filter:
            - integration: oralb
              domain: sensor
            - integration: philips_sonicare_ble
              domain: sensor
            - integration: philips_sonicare_ble
              domain: binary_sensor

    brushed_helper:
      name: Brushing Tracker Helper
      description: Choose the Toggle helper you created (e.g., "Toothbrush Tracker").
      selector:
        entity:
          domain: input_boolean
          multiple: false

    notification_device:
      name: Notification Device
      description: The mobile device running the Home Assistant app to receive reminders.
      selector:
        device:
          integration: mobile_app
          multiple: false

    enable_morning:
      name: Enable Morning Reminders
      description: Check this box to track your morning routine.
      default: false
      selector:
        boolean: {}

    morning_reminder_time:
      name: Morning Reminder Time
      description: The baseline time for the morning alarm. (Only applies if 'Enable Morning Reminders' is checked above).
      default: '09:00:00'
      selector:
        time: {}

    enable_evening:
      name: Enable Evening Reminders
      description: Check this box to track your evening routine.
      default: true
      selector:
        boolean: {}

    evening_reminder_time:
      name: Evening Reminder Time
      description: The baseline time for the evening alarm. (Only applies if 'Enable Evening Reminders' is checked above).
      default: '21:00:00'
      selector:
        time: {}

    # --- RANDOMIZER SECTION (VISIBLE) ---
    randomizer_settings:
      name: 🎲 ADHD Randomizer Delay
      description: >
        Adding unpredictability to alerts helps break notification blindness. The reminder will fire randomly between 0 minutes and your chosen maximum delay. (A 15-minute window is recommended to remain unpredictable without losing the context of the task).
      icon: mdi:dice-multiple
      collapsed: false
      input:
        enable_randomizer:
          name: Enable Randomizer Delay
          description: If turned off, notifications will fire precisely at the reminder times set above (0 minute delay).
          default: true
          selector:
            boolean: {}
        random_delay_window:
          name: Randomizer Window (minutes)
          description: The maximum number of minutes the notification can be randomly delayed.
          default: 15
          selector:
            number:
              min: 0.0
              max: 60.0
              step: 1.0
              mode: slider

    # --- ADVANCED CONFIGURATION (COLLAPSED) ---
    advanced_settings:
      name: ⚙️ Advanced Settings
      description: Optional customizations. Proceed with caution when altering check times.
      icon: mdi:cogs
      collapsed: true
      input:
        notification_title:
          name: Notification Title
          default: Routine Check-In 🪥
          selector:
            text: {}
        morning_message:
          name: Morning Message
          default: Fresh breath baseline! Let's get those teeth brushed before the day gets away from you.
          selector:
            text: {}
        evening_message:
          name: Evening Message
          default: Future you will thank you. Let's knock out toothbrushing now so you can properly unwind.
          selector:
            text: {}
        notification_group:
          name: Notification Group / Thread ID
          description: Groups these reminders together in your mobile notification center to prevent clutter. Works on both iOS and Android.
          default: toothbrush_routine
          selector:
            text: {}
        brushing_duration:
          name: Minimum Brushing Duration (minutes)
          description: How long the toothbrush must run to count as a valid session.
          default: 2
          selector:
            number:
              min: 1.0
              max: 5.0
              step: 1.0
              mode: box
        use_custom_morning_start:
          name: Override Morning Check Time
          description: "⚠️ ADVANCED: The system naturally starts tracking morning brushing at 4:00 AM. Only check this box if you have a highly unusual schedule (e.g., shift work) and need to alter the core logic."
          default: false
          selector:
            boolean: {}
        custom_morning_start_time:
          name: Custom Morning Check Start Time
          description: Takes effect only if the override box above is checked.
          default: '04:00:00'
          selector:
            time: {}
        use_custom_evening_start:
          name: Override Evening Check Time
          description: "⚠️ ADVANCED: The system naturally starts tracking evening brushing at 4:00 PM (16:00). Only check this box to alter the core logic."
          default: false
          selector:
            boolean: {}
        custom_evening_start_time:
          name: Custom Evening Check Start Time
          description: Takes effect only if the override box above is checked.
          default: '16:00:00'
          selector:
            time: {}

variables:
  morning_enabled: !input enable_morning
  evening_enabled: !input enable_evening
  randomizer_enabled: !input enable_randomizer
  max_delay: !input random_delay_window
  use_custom_am_start: !input use_custom_morning_start
  custom_am_start: !input custom_morning_start_time
  use_custom_pm_start: !input use_custom_evening_start
  custom_pm_start: !input custom_evening_start_time

mode: single

trigger:
  - platform: state
    entity_id: !input toothbrush_entity
    to:
      - 'running'
      - 'Running'
      - 'Brushing'
      - 'On'
      - 'on'
    for:
      minutes: !input brushing_duration
    id: 'toothbrush_used'
  - platform: time
    at: !input morning_reminder_time
    id: 'morning_alarm'
  - platform: time
    at: !input evening_reminder_time
    id: 'evening_alarm'
  - platform: time
    at: '00:00:00'
    id: 'reset_morning'
  - platform: time
    at: '12:00:00'
    id: 'reset_evening'

action:
  - choose:
      # 1. Toothbrush Tracking
      - conditions:
          - condition: trigger
            id: 'toothbrush_used'
        sequence:
          - choose:
              # Morning Match
              - conditions:
                  - condition: template
                    value_template: "{{ morning_enabled }}"
                  - condition: template
                    value_template: >
                      {% set current_time = now().strftime('%H:%M:%S') %}
                      {% set start_time = custom_am_start if use_custom_am_start else '04:00:00' %}
                      {{ current_time >= start_time and current_time < '12:00:00' }}
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input brushed_helper
              # Evening Match
              - conditions:
                  - condition: template
                    value_template: "{{ evening_enabled }}"
                  - condition: template
                    value_template: >
                      {% set current_time = now().strftime('%H:%M:%S') %}
                      {% set start_time = custom_pm_start if use_custom_pm_start else '16:00:00' %}
                      {{ current_time >= start_time and current_time <= '23:59:59' }}
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input brushed_helper

      # 2. Morning Reminder
      - conditions:
          - condition: trigger
            id: 'morning_alarm'
          - condition: template
            value_template: "{{ morning_enabled }}"
          - condition: state
            entity_id: !input brushed_helper
            state: 'off'
        sequence:
          - delay:
              minutes: >
                {% if randomizer_enabled %}
                  {{ range(0, max_delay | int + 1) | random }}
                {% else %}
                  0
                {% endif %}
          - condition: state
            entity_id: !input brushed_helper
            state: 'off'
          - domain: mobile_app
            type: notify
            device_id: !input notification_device
            title: !input notification_title
            message: !input morning_message
            data:
              group: !input notification_group
              push:
                thread-id: !input notification_group

      # 3. Evening Reminder
      - conditions:
          - condition: trigger
            id: 'evening_alarm'
          - condition: template
            value_template: "{{ evening_enabled }}"
          - condition: state
            entity_id: !input brushed_helper
            state: 'off'
        sequence:
          - delay:
              minutes: >
                {% if randomizer_enabled %}
                  {{ range(0, max_delay | int + 1) | random }}
                {% else %}
                  0
                {% endif %}
          - condition: state
            entity_id: !input brushed_helper
            state: 'off'
          - domain: mobile_app
            type: notify
            device_id: !input notification_device
            title: !input notification_title
            message: !input evening_message
            data:
              group: !input notification_group
              push:
                thread-id: !input notification_group

      # 4. Resets
      - conditions:
          - condition: trigger
            id: 'reset_morning'
          - condition: template
            value_template: "{{ morning_enabled }}"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input brushed_helper

      - conditions:
          - condition: trigger
            id: 'reset_evening'
          - condition: template
            value_template: "{{ evening_enabled }}"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input brushed_helper