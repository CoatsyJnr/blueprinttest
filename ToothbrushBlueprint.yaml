blueprint:
  name: ADHD-Friendly Brushing System (Morning & Evening)
  description: >
    An unpredictable, ADHD-friendly toothbrushing tracker and reminder system. 
    Delays notifications by a random window to defeat notification blindness.
    
    **Prerequisite:** You must manually create one 'Input Boolean' (Toggle) helper in Home Assistant before configuring this automation.
  domain: automation
  homeassistant:
    min_version: 2023.11.0
  
  input:
    # --- PRIMARY SETUP ---
    toothbrush_entity:
      name: Toothbrush State Sensor
      description: Select your Oral-B toothbrush state sensor.
      selector:
        entity:
          integration: oralb
          domain: sensor
          multiple: false

    brushed_helper:
      name: Brushing Tracker Helper
      description: Choose the Input Boolean (Toggle) helper you created to track your daily progress.
      selector:
        entity:
          domain: input_boolean
          multiple: false

    notification_device:
      name: Notification Device
      description: The mobile device running the Home Assistant app to receive reminders.
      selector:
        device:
          integration: mobile_app
          multiple: false

    enable_morning:
      name: Enable Morning Reminders
      description: Check this box to track and remind you in the morning.
      default: false
      selector:
        boolean: {}

    enable_evening:
      name: Enable Evening Reminders
      description: Check this box to track and remind you in the evening.
      default: true
      selector:
        boolean: {}

    # --- ADVANCED CONFIGURATION (COLLAPSED) ---
    advanced_timing:
      name: ⚙️ Advanced Timing Options
      icon: mdi:clock-outline
      collapsed: true
      input:
        morning_check_start_time:
          name: Morning Check Start Time
          description: Earliest time a morning brushing session counts.
          default: '05:00:00'
          selector:
            time: {}
        morning_reminder_time:
          name: Morning Reminder Time
          description: The baseline time to check if you brushed this morning.
          default: '09:00:00'
          selector:
            time: {}
        evening_check_start_time:
          name: Evening Check Start Time
          description: Earliest time an evening brushing session counts.
          default: '17:00:00'
          selector:
            time: {}
        evening_reminder_time:
          name: Evening Reminder Time
          description: The baseline time to check if you brushed this evening.
          default: '21:00:00'
          selector:
            time: {}
        brushing_duration:
          name: Minimum Brushing Duration (minutes)
          description: How long the toothbrush must run to count as a valid session.
          default: 2
          selector:
            number:
              min: 1.0
              max: 5.0
              step: 1.0
              mode: box

    advanced_randomizer:
      name: 🎲 ADHD Randomizer Delay
      description: Adjust the unpredictable window to stop your brain from tuning out the alarm.
      icon: mdi:dice-multiple
      collapsed: true
      input:
        min_random_delay:
          name: Minimum Random Delay (minutes)
          default: 15
          selector:
            number:
              min: 0.0
              max: 60.0
              step: 1.0
              mode: slider
        max_random_delay:
          name: Maximum Random Delay (minutes)
          default: 30
          selector:
            number:
              min: 0.0
              max: 60.0
              step: 1.0
              mode: slider

    advanced_notifications:
      name: 💬 Custom Notification Text
      icon: mdi:message-text-outline
      collapsed: true
      input:
        notification_title:
          name: Notification Title
          default: Routine Check-In 🪥
          selector:
            text: {}
        morning_message:
          name: Morning Message
          default: Fresh breath baseline! Let's get those teeth brushed before the day gets away from you.
          selector:
            text: {}
        evening_message:
          name: Evening Message
          default: Future you will thank you. Let's knock out toothbrushing now so you can properly unwind.
          selector:
            text: {}

variables:
  min_delay: !input min_random_delay
  max_delay: !input max_random_delay
  morning_enabled: !input enable_morning
  evening_enabled: !input enable_evening

mode: single

trigger:
  - platform: state
    entity_id: !input toothbrush_entity
    to: 'running'
    for:
      minutes: !input brushing_duration
    id: 'toothbrush_used'
  - platform: time
    at: !input morning_reminder_time
    id: 'morning_alarm'
  - platform: time
    at: !input evening_reminder_time
    id: 'evening_alarm'
  - platform: time
    at: '00:00:00'
    id: 'reset_morning'
  - platform: time
    at: '12:00:00'
    id: 'reset_evening'

action:
  - choose:
      # 1. Toothbrush Tracking
      - conditions:
          - condition: trigger
            id: 'toothbrush_used'
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ morning_enabled }}"
                  - condition: time
                    after: !input morning_check_start_time
                    before: '12:00:00'
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input brushed_helper
              - conditions:
                  - condition: template
                    value_template: "{{ evening_enabled }}"
                  - condition: time
                    after: !input evening_check_start_time
                    before: '23:59:59'
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input brushed_helper

      # 2. Morning Reminder
      - conditions:
          - condition: trigger
            id: 'morning_alarm'
          - condition: template
            value_template: "{{ morning_enabled }}"
          - condition: state
            entity_id: !input brushed_helper
            state: 'off'
        sequence:
          - delay:
              minutes: "{{ range(min_delay | int, max_delay | int + 1) | random }}"
          - condition: state
            entity_id: !input brushed_helper
            state: 'off'
          - domain: mobile_app
            type: notify
            device_id: !input notification_device
            title: !input notification_title
            message: !input morning_message

      # 3. Evening Reminder
      - conditions:
          - condition: trigger
            id: 'evening_alarm'
          - condition: template
            value_template: "{{ evening_enabled }}"
          - condition: state
            entity_id: !input brushed_helper
            state: 'off'
        sequence:
          - delay:
              minutes: "{{ range(min_delay | int, max_delay | int + 1) | random }}"
          - condition: state
            entity_id: !input brushed_helper
            state: 'off'
          - domain: mobile_app
            type: notify
            device_id: !input notification_device
            title: !input notification_title
            message: !input evening_message

      # 4. Resets
      - conditions:
          - condition: trigger
            id: 'reset_morning'
          - condition: template
            value_template: "{{ morning_enabled }}"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input brushed_helper

      - conditions:
          - condition: trigger
            id: 'reset_evening'
          - condition: template
            value_template: "{{ evening_enabled }}"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input brushed_helper